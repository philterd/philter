services:

  philter:
    depends_on:
      ph-eye:
        condition: service_started
      mongodb:
        condition: service_healthy
      valkey:
        condition: service_healthy
    build:
      context: .
    environment:
      CACHE_HOSTNAME: valkey
      CACHE_PORT: 6379
      #CACHE_PASSWORD:
      CACHE_SSL: false
      MONGODB_CONNECTION_STRING: mongodb://mongodb:27017/philter
      # Base64-encoded 32-byte (AES-256) key for encrypting sensitive data at rest.
      # Required. Generate one with: openssl rand -base64 32
      PHILTER_ENCRYPTION_KEY: ${PHILTER_ENCRYPTION_KEY:?set PHILTER_ENCRYPTION_KEY (e.g. export PHILTER_ENCRYPTION_KEY=$(openssl rand -base64 32))}
    ports:
      - "8080:8080"
    networks:
      - philter

  ph-eye:
    image: philterd/ph-eye:1.2.1
    ports:
      - "18080:5000"
    networks:
      - philter
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: philter
      #MONGO_INITDB_ROOT_USERNAME: admin
      #MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - philter
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  valkey:
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
    networks:
      - philter
    command: valkey-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  philter:
