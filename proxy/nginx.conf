# Philter reverse proxy.
#
# Single public entry point that serves the Philter UI/API and the bundled policy editor
# from the same origin. Because both are reached through this one origin, the Philter UI can
# link to the editor with a relative URL (POLICY_EDITOR_URL=/policy-editor/) that works for any
# hostname or IP, with no per-deployment configuration — important for VM/marketplace images
# that do not know their public address at build time.

# Map for WebSocket upgrade, used by Vaadin server push.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;

    # Allow large request bodies for PDF redaction uploads.
    client_max_body_size 100m;

    # Policy editor (static SPA). The trailing slash on proxy_pass strips the /policy-editor/
    # prefix before forwarding to the editor.
    #
    # IMPORTANT: the redaction-policy-editor image must be built with a base path of
    # /policy-editor/ so its index references assets as /policy-editor/assets/... — those
    # requests then route back here and are forwarded to the editor. An editor built for the
    # root path will load index.html but fail to fetch its assets.
    location /policy-editor/ {
        proxy_pass http://redaction-policy-editor:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Philter UI and API.
    location / {
        proxy_pass http://philter:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Vaadin server push uses WebSockets.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Long-lived push connections.
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
