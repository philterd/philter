services:

  philter:
    depends_on:
      ph-eye:
        condition: service_started
      mongodb:
        condition: service_healthy
      valkey:
        condition: service_healthy
    build:
      context: .
    environment:
      CACHE_HOSTNAME: valkey
      CACHE_PORT: 6379
      #CACHE_PASSWORD:
      CACHE_SSL: false
      MONGODB_CONNECTION_STRING: mongodb://mongodb:27017/philter
      # Browser-facing URL of the policy editor. The proxy serves the editor under the same
      # origin as Philter, so a relative path works for any hostname/IP with no per-deployment config.
      POLICY_EDITOR_URL: /policy-editor/
      # Base64-encoded 32-byte (AES-256) key for encrypting sensitive data at rest.
      # Required. Generate one with: openssl rand -base64 32
      PHILTER_ENCRYPTION_KEY: ${PHILTER_ENCRYPTION_KEY:?set PHILTER_ENCRYPTION_KEY (e.g. export PHILTER_ENCRYPTION_KEY=$(openssl rand -base64 32))}
    # No host port: the proxy is the single public entry point and reaches Philter over the network.
    networks:
      - philter

  redaction-policy-editor:
    image: philterd/philterd-redaction-policy-editor:latest
    # No host port: reached only through the proxy at /policy-editor/.
    # NOTE: this image must be built with a base path of /policy-editor/ so its assets resolve
    # under that prefix (see proxy/nginx.conf).
    networks:
      - philter

  proxy:
    image: nginx:stable-alpine
    depends_on:
      philter:
        condition: service_started
      redaction-policy-editor:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - philter

  ph-eye:
    image: philterd/ph-eye:1.2.1
    ports:
      - "18080:5000"
    networks:
      - philter
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: philter
      #MONGO_INITDB_ROOT_USERNAME: admin
      #MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - philter
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  valkey:
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
    networks:
      - philter
    command: valkey-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  philter:
