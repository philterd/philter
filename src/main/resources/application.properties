# Expose only the health and Prometheus actuator endpoints.
# Prometheus scrapes metrics from /actuator/prometheus.
management.endpoints.web.exposure.include=health,prometheus

# Dashboard session timeout. After this many minutes of inactivity the user's session is closed and
# they are redirected back to the login page (see SessionTimeoutConfigurer). The duration is set with
# the SESSION_TIMEOUT_MINUTES environment variable and defaults to 15 minutes.
#
# vaadin.close-idle-sessions makes Vaadin honor this timeout for an open dashboard tab: without it,
# Vaadin's periodic heartbeat would keep the session alive indefinitely and the idle user would never
# be logged out. With it, heartbeats no longer count as activity, so only real user interaction resets
# the idle timer.
#
# An idle session is only closed when a request reaches the server, and for an untouched tab the only
# such requests are heartbeats. The heartbeat interval therefore bounds how late the logout can be, so
# it is set to 60 seconds to keep the actual logout within about a minute of the configured timeout.
server.servlet.session.timeout=${SESSION_TIMEOUT_MINUTES:15}m
vaadin.close-idle-sessions=true
vaadin.heartbeat-interval=60
